      if ('serviceWorker' in navigator) {

    <!-- Script automatizado para la sección de Sermones -->
    <script>
    const RSS_FEED_URL = "https://anchor.fm/s/dc304bfc/podcast/rss";
    const CONVERTER_API = `https://api.rss2json.com/v1/api.json?rss_url=${encodeURIComponent(RSS_FEED_URL)}`;

    async function inicializarSermones() {
        try {
            const response = await fetch(CONVERTER_API);
            const data = await response.json();
            
            if (data.status === 'ok' && data.items.length > 0) {
                const episodios = data.items;
                
                // 1. Cargar el episodio más reciente arriba
                actualizarReproductorPrincipal(episodios[0].link);
                
                // 2. Generar el archivo histórico abajo
                const archiveContainer = document.getElementById('sermons-archive-list');
                archiveContainer.innerHTML = ''; 

                const historial = episodios.slice(1);
                
                historial.forEach(item => {
                    const fechaFormateada = new Date(item.pubDate).toLocaleDateString('es-ES', {
                        month: 'short', day: 'numeric', year: 'numeric'
                    });

                    const tarjetaSermon = document.createElement('div');
                    tarjetaSermon.style.cssText = "display: flex; align-items: center; background: #1a2436; padding: 12px; margin-bottom: 12px; border-radius: 8px; cursor: pointer; transition: transform 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); font-family: system-ui, sans-serif;";
                    
                    tarjetaSermon.onmouseenter = () => tarjetaSermon.style.transform = "scale(1.01)";
                    tarjetaSermon.onmouseleave = () => tarjetaSermon.style.transform = "scale(1)";
                    
                    tarjetaSermon.onclick = () => {
                        actualizarReproductorPrincipal(item.link);
                        document.getElementById('sermones').scrollTo({ top: 0, behavior: 'smooth' });
                    };

                    tarjetaSermon.innerHTML = `
                        <img src="${item.thumbnail || data.feed.image}" alt="Portada" style="width: 50px; height: 50px; border-radius: 6px; margin-right: 15px; object-fit: cover;">
                        <div style="flex-grow: 1; min-width: 0; text-align: left;">
                            <h4 style="color: #ffffff; margin: 0 0 4px 0; font-size: 0.95rem; font-weight: bold; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
                                ${item.title}
                            </h4>
                            <span style="color: #a0aec0; font-size: 0.8rem;">
                                ${fechaFormateada} • Pura Gracia Radio
                            </span>
                        </div>
                        <div style="color: #fbac33; padding-left: 10px; display: flex; align-items: center;">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
                        </div>
                    `;
                    archiveContainer.appendChild(tarjetaSermon);
                });
                
            } else {
                mostrarError();
            }
        } catch (error) {
            console.error("Error procesando el feed:", error);
            mostrarError();
        }
    }

    function actualizarReproductorPrincipal(linkAnchor) {
        const playerContainer = document.getElementById('main-player-container');
        let embedUrl = linkAnchor.replace("podcasters.spotify.com/pod/show", "open.spotify.com/embed/episode")
                         .replace("anchor.fm", "open.spotify.com/embed/episode");

        playerContainer.innerHTML = `
            <iframe 
                src="${embedUrl}" 
                width="100%" 
                height="200" 
                frameborder="0" 
                allowfullscreen="" 
                allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
                loading="lazy"
                style="border: none; display: block;">
            </iframe>
        `;
    }

    function mostrarError() {
        document.getElementById('main-player-container').innerHTML = `<p style="color: #e53e3e; text-align: center; padding: 20px; font-family: system-ui, sans-serif;">No se pudo cargar el reproductor principal.</p>`;
    }

    // Carga inicial al cargar el documento
    document.addEventListener('DOMContentLoaded', inicializarSermones);
    </script>
