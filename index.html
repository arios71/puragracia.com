<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>WRPG-DB Pura Gracia | Escuchar Radio Cristiana Reformada en vivo 24/7</title>

<meta name="description" content="Escucha Pura Gracia Radio, emisora cristiana reformada online 24/7.">
<meta name="robots" content="index, follow">

<link rel="stylesheet" href="/css/styles.css">

<style>

/* ===== HEADER LOGO ===== */
.logo-head{
  max-width: 260px;
  width: 80%;
  margin: 20px auto 10px;
  display:block;
}

/* ===== RADIO CARD ===== */
.radio-wrapper{
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(14px);
  border-radius:20px;
  padding:14px;
  max-width:520px;
  width:100%;
  margin:0 auto;
  box-shadow:0 15px 45px rgba(0,0,0,.6);
  border:1px solid rgba(77,163,255,.2);
  display:flex;
  flex-direction:column;
  gap:10px;
}

/* BOTÓN */
.player{
  display:flex;
  justify-content:center;
}

#playRadio{
  width:100%;
  max-width:260px;
  padding:14px;
  border-radius:999px;
  font-size:1rem;
  font-weight:bold;
  background:linear-gradient(135deg,#3a8bd8,#1f5fbf);
  color:#fff;
  border:none;
}

/* EN VIVO */
.live-status{
  text-align:center;
  color:#ff3b3b;
  font-weight:bold;
  font-size:.9rem;
}

/* DIVIDER */
.divider{
  height:1px;
  background:rgba(255,255,255,.1);
}

/* NOW PLAYING */
.now-playing{
  display:flex;
  gap:12px;
  align-items:center;
  background:rgba(0,0,0,.25);
  border-radius:14px;
  padding:10px;
}

/* IMAGEN */
.now-playing img{
  width:95px;
  height:95px;
  border-radius:12px;
  object-fit:cover;
}

/* INFO */
.now-playing .info{
  display:flex;
  flex-direction:column;
  gap:4px;
  text-align:left;
}

.now-playing .label{
  font-size:.75rem;
  opacity:.6;
}

.now-playing .title{
  font-size:1rem;
  font-weight:bold;
}

.now-playing .artist{
  font-size:.85rem;
  opacity:.8;
}

/* MOBILE */
@media(max-width:480px){
  .now-playing img{
    width:75px;
    height:75px;
  }
}

</style>

</head>

<body>

<header>
  <nav class="nav">
    <a href="#" data-section="inicio">Inicio</a>
    <a href="#" data-section="programacion">Programación</a>
    <a href="#" data-section="sermones">Sermones</a>
    <a href="#" data-section="contacto">Contacto</a>
  </nav>
</header>

<main class="app">

<section id="inicio" class="section active">

  <!-- LOGO NUEVO -->
  <img class="logo-head" src="/assets/branding/logo-head.webp" alt="Pura Gracia Radio">

  <!-- PLAYER -->
  <section class="player-section">

    <div class="radio-wrapper">

      <div class="player">
        <button id="playRadio">▶ Reproducir Radio</button>
      </div>

      <div class="live-status">🔴 En vivo</div>

      <div class="divider"></div>

      <!-- NOW PLAYING -->
      <div id="nowPlayingBox" class="now-playing">
        <!-- tu JS lo llena -->
      </div>

      <audio id="radioAudio" preload="none">
        <source src="https://playerservices.streamtheworld.com/api/livestream-redirect/SAM05AAC459_SC" type="audio/mpeg">
      </audio>

    </div>

  </section>

  <!-- WhatsApp -->
  <a href="https://www.whatsapp.com/channel/0029VaAFdiO60eBjjXuyei1U"
     class="whatsapp-float"
     target="_blank"
     rel="noopener">
    <img src="/assets/icons/whatsapp.png">
  </a>

</section>

<!-- PROGRAMACION -->
<section id="programacion" class="section">
  <h2>🗓️ Programación</h2>
  <div class="iframe-wrapper">
    <iframe src="https://teamup.com/ksqyre4rtx15nnfei3?view=d&showViewHeader=0&showTitle=0&showLogo=0&showMenu=0&disableSidepanel=1"></iframe>
  </div>
</section>

<!-- SERMONES -->
<section id="sermones" class="section">
  <h2>🎙️ Sermones</h2>
  <div class="iframe-wrapper pg-spotify-wrapper">
    <iframe src="https://open.spotify.com/embed/show/7bCzhWNjuVzSWeTLXvk9vt"></iframe>
  </div>
</section>

<!-- CONTACTO -->
<section id="contacto" class="section">
  <h2>📬 Contacto</h2>
  <p>radio@puragracia.com</p>
</section>

<footer>
  © 2026 Iglesia Bíblica Gracia Verdadera
</footer>

</main>

<script src="js/radio.js"></script>
<script src="js/menu.js"></script>
<script src="js/nowplaying.js"></script>

</body>
</html>
