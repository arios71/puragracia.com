<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Programación | Pura Gracia Radio</title>
  <meta name="description" content="Consulta la programación de Pura Gracia Radio: horarios y programas en vivo 24/7.">
  <link rel="canonical" href="https://www.puragracia.com/programacion/">

  <!-- PWA manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- Open Graph -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.puragracia.com/programacion/" />
  <meta property="og:title" content="Programación | Pura Gracia Radio" />
  <meta property="og:description" content="Consulta la programación de Pura Gracia Radio: horarios y programas en vivo 24/7." />
  <meta property="og:image" content="https://www.puragracia.com/assets/icons/logo-512.png" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Programación | Pura Gracia Radio" />
  <meta name="twitter:description" content="Consulta la programación de Pura Gracia Radio: horarios y programas en vivo 24/7." />
  <meta name="twitter:image" content="https://www.puragracia.com/assets/icons/logo-512.png" />

  <!-- Styles (opcional) -->
  <link rel="stylesheet" href="/css/styles.css">

  <!-- Redirección suave a la SPA -->
  <script>
    if (typeof window !== "undefined") {
      // Espera a que cargue el DOM para redirigir
      window.addEventListener("DOMContentLoaded", function() {
        // Solo redirige si no está ya en la SPA
        if (!window.location.hash.includes("programacion")) {
          window.location.replace("/#programacion");
        }
      });
    }
  </script>
</head>
<body>
  <main>
    <h1>🗓️ Programación de Pura Gracia Radio</h1>
    <p>Aquí puedes consultar todos los horarios y programas de nuestra emisora cristiana reformada online 24/7.</p>
    <p>La programación se reproduce en vivo a través de nuestra PWA.</p>

    <!-- Enlace visible por si el usuario quiere abrir manualmente -->
    <p><a href="/#programacion">Ver programación en la PWA</a></p>
  </main>

  <!-- JS específico de programación (opcional) -->
  <script src="/js/schedule.js" defer></script>
</body>
</html>
